services:
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - jobfix-network
    restart: unless-stopped

  backend:
    build:
      context: ./apps/core-service
      dockerfile: Dockerfile
    env_file:
      - ./apps/core-service/.env
    environment:
      PORT: "3001"
      AI_SERVICE_URL: http://ai-service:8000
      CORS_ORIGINS: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      ai-service:
        condition: service_healthy
    networks:
      - jobfix-network
    restart: unless-stopped

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      CORE_API_URL: http://backend:3001
    ports:
      - "8000:8000"
    networks:
      - jobfix-network
    restart: unless-stopped

networks:
  jobfix-network:
    driver: bridge
